    // ============================================================
    // API Helper - Worker 프록시를 통해 Gemini 호출
    // ============================================================
    async function callGemini(systemPrompt, messages) {
      // Worker는 prompt 문자열 형식을 받음 - messages 배열을 텍스트로 변환
      let promptText;
      if (messages.length === 1) {
        promptText = messages[0].parts[0].text;
      } else {
        promptText = messages.map(m => {
          const roleName = m.role === 'user' ? '학생' : '선생님';
          return `${roleName}: ${m.parts[0].text}`;
        }).join('\n');
      }

      const payload = {
        model: MODEL_NAME,
        prompt: promptText,
        systemInstruction: systemPrompt
      };

      for (let i = 0; i < 5; i++) {
        try {
          const response = await fetch(WORKER_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          if (!response.ok) throw new Error(`HTTP ${response.status}`);

          const result = await response.json();
          let text = result.candidates?.[0]?.content?.parts?.[0]?.text || "";
          return text.replace(/\*/g, '').trim();
        } catch (e) {
          console.error(`호출 실패 (${i + 1}/5):`, e);
          if (i < 4) await new Promise(res => setTimeout(res, Math.pow(2, i) * 1000));
        }
      }
      return "잠시 통신이 원활하지 않네. 다시 말해줄래?";
    }

          { id: 'q1', label: "문제집을 풀 때, 여러 권을 빨리 끝내는 것보다 한 권을 풀더라도 내가 무엇을 알고 모르는지 정확히 짚어보려 했던 경험이 있다면 적어보자." },
          { id: 'q2', label: "우연히 맞힌 문제나 감으로 푼 문제를 그냥 넘어가지 않고, 왜 맞았는지 확실한 이유를 찾아보는 과정은 나의 실력에 어떤 영향을 미칠까?" },
          { id: 'action', label: "다음번에 문제집을 채점할 때, 단순히 맞고 틀린 것만 표시하는 것을 넘어 나의 '이해 상태'를 어떻게 기록해 보고 싶어?" }
        ]
      }
    };

    const KIM_SUSEOK_PROFILE = "https://res.cloudinary.com/dms5vyofw/image/upload/v1766382489/%E1%84%80%E1%85%B5%E1%86%B7%E1%84%89%E1%85%AE%E1%84%89%E1%85%A5%E1%86%A8%E1%84%8B%E1%85%A1%E1%84%8B%E1%85%B5%E1%84%8F%E1%85%A9%E1%86%AB_%E1%84%85%E1%85%A1%E1%84%8B%E1%85%B5%E1%86%AB_%E1%84%8F%E1%85%A5%E1%86%AF%E1%84%85%E1%85%A51_snx7la.png";

    // ============================================================
    // 인라인 SVG 아이콘 컴포넌트
    // ============================================================
    const Icon = ({ d, size = 20, color = "currentColor", style = {} }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
        fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>
        {Array.isArray(d) ? d.map((path, i) => <path key={i} d={path} />) : <path d={d} />}
      </svg>
    );
    const ChevronRight = ({ size = 20, color = "currentColor" }) => <Icon size={size} color={color} d="M9 18l6-6-6-6" />;
    const ArrowLeft = ({ size = 20, color = "currentColor" }) => <Icon size={size} color={color} d="M19 12H5M12 5l-7 7 7 7" />;
    const Home = ({ size = 20, color = "currentColor" }) => <Icon size={size} color={color} d={["M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z", "M9 22V12h6v10"]} />;
    const Send = ({ size = 20, color = "currentColor" }) => <Icon size={size} color={color} d={["M22 2L11 13", "M22 2L15 22 11 13 2 9l20-7"]} />;
    const Star = ({ size = 20, color = "currentColor" }) => <Icon size={size} color={color} d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />;
    const HelpCircle = ({ size = 20, color = "currentColor" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="10" /><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3" /><line x1="12" y1="17" x2="12.01" y2="17" />
      </svg>
    );
    const MessageSquare = ({ size = 20, color = "currentColor" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
      </svg>
    );
    const PenTool = ({ size = 20, color = "currentColor" }) => <Icon size={size} color={color} d={["M12 19l7-7 3 3-7 7-3-3z", "M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z", "M2 2l7.586 7.586", "M11 11a2 2 0 10-4 0 2 2 0 004 0z"]} />;
    const Download = ({ size = 20, color = "currentColor" }) => <Icon size={size} color={color} d={["M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4", "M7 10l5 5 5-5", "M12 15V3"]} />;
    const MousePointerClick = ({ size = 20, color = "currentColor" }) => <Icon size={size} color={color} d={["M9 4.5V2", "M13.5 6.5L15.5 5", "M6.5 13.5L5 15.5", "M4.5 9H2", "M18.367 11.893L22 22l-10.107-3.633-2.26-5.114 8.734-2zm0 0L13.5 6.5"]} />;
    const Loader2 = ({ size = 20, color = "currentColor", style = {} }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>
        <path d="M21 12a9 9 0 11-6.219-8.56" />
      </svg>
    );

    // ============================================================
    // App Component
    // ============================================================
    const App = () => {
      const [view, setView] = useState('home');
      const [selectedKeyword, setSelectedKeyword] = useState(null);
      const [answers, setAnswers] = useState({ initialThought: '', quiz: { q1: '', q2: '', q3: '' }, check: { q1: '', q2: '', action: '' }, summary: { def: '', benefit: '' } });
      const [chatHistory, setChatHistory] = useState([]);
      const [finalChatHistory, setFinalChatHistory] = useState([]);
      const [isTyping, setIsTyping] = useState(false);
      const [chatInput, setChatInput] = useState('');
      const [suseokReview, setSuseokReview] = useState('');
      const [isDownloading, setIsDownloading] = useState(false);
      const [defIndex, setDefIndex] = useState(0);
      const [impIndex, setImpIndex] = useState(-1);
      const [showGuide, setShowGuide] = useState(true);
      const chatContainerRef = useRef(null);

      const scrollToBottom = () => {
        if (chatContainerRef.current) chatContainerRef.current.scrollTop = chatContainerRef.current.scrollHeight;
      };
      useEffect(() => { scrollToBottom(); }, [chatHistory, finalChatHistory, isTyping]);

      useEffect(() => {
        if (view === 'p3' && chatHistory.length === 0) {
          const initialThought = answers.initialThought || "없음";
          sendChatMessage('mid', `[시스템 지시: 학생이 처음에 생각한 내용("${initialThought}")과 방금 작성한 퀴즈 답변(${JSON.stringify(answers.quiz)})을 마음속으로 종합해봐. 절대 답변을 나열하지 마. 내용을 관통하는 단 하나의 통찰력 있는 질문을 던져서 대화를 시작해. 친구처럼 다정하게.]`);
        } else if (view === 'p5' && finalChatHistory.length === 0) {
          sendChatMessage('final', `[시스템 지시: 학생이 방금 '마음 들여다보기'에서 적은 내용(${JSON.stringify(answers.check)})을 바탕으로 대화를 시작해. 나열하지 말고, 스스로 다짐한 내용을 구체적인 행동으로 옮길 수 있도록 돕는 하나의 질문을 던져줘.]`);
        }
      }, [view]);

      useEffect(() => {
        if (view === 'report' && !suseokReview) generateFinalReview();
      }, [view]);

      useEffect(() => {
        if (view === 'report' && !window.html2canvas) {
          const s = document.createElement('script');
          s.src = "https://html2canvas.hertzen.com/dist/html2canvas.min.js";
          document.head.appendChild(s);
        }
      }, [view]);

      const generateFinalReview = async () => {
        const prompt = `너는 학생의 가장 친한 친구이자 멘토야. 
학생이 작성한 모든 데이터(초기 생각, 퀴즈, 체크리스트)와 대화의 흐름을 모두 참고해.
학생이 처음엔 어떤 생각을 가졌는데, 과정을 통해 어떻게 생각이 깊어졌는지 긍정적 변화를 요약해서 총평을 써줘. 
딱딱한 말투 대신, 친근하고 다정하며 따뜻한 반말로 작성해줘. 
뻔한 칭찬보다는 진심 어린 공감과 응원의 메시지를 담아줘.
본인을 '나'라고 칭하고 '수석', '김수석' 같은 호칭은 절대 쓰지 마. 
3~4문장으로 작성해줘. 별표(*)는 쓰지 마.
전체 데이터: ${JSON.stringify(answers)} / 마지막 대화 요약: ${JSON.stringify(finalChatHistory.slice(-2))}`;
        const result = await callGemini(prompt, [{ role: 'user', parts: [{ text: "최종 총평을 친구처럼 다정하게 작성해줘." }] }]);
        setSuseokReview(result);
      };

      const startSession = (keyword) => {
        setSelectedKeyword(keyword);
        setView('p0');
        setAnswers({ initialThought: '', quiz: { q1: '', q2: '', q3: '' }, check: { q1: '', q2: '', action: '' }, summary: { def: '', benefit: '' } });
        setChatHistory([]); setFinalChatHistory([]); setChatInput(''); setSuseokReview('');
        setDefIndex(0); setImpIndex(-1); setShowGuide(true);
      };

      const handleNext = () => {
        const seq = ['home', 'p0', 'p1', 'p2', 'p3', 'p4', 'p5', 'p6', 'report'];
        const idx = seq.indexOf(view);
        if (idx < seq.length - 1) setView(seq[idx + 1]);
      };

      const sendChatMessage = async (type = 'mid', initialMsg = null) => {
        const msg = initialMsg || chatInput.trim();
        if (!msg) return;
        if (!initialMsg) setChatInput('');

        const history = type === 'mid' ? chatHistory : finalChatHistory;
        const setHistory = type === 'mid' ? setChatHistory : setFinalChatHistory;

        let updatedHistory = history;
        if (!initialMsg && msg) {
          updatedHistory = [...history, { role: 'user', content: msg }];
          setHistory(updatedHistory);
        }

        setIsTyping(true);

        // Gemini API 형식으로 변환
        const apiMessages = updatedHistory.map(h => ({
          role: h.role === 'user' ? 'user' : 'model',
          parts: [{ text: h.content }]
        }));

        const userMsgCount = updatedHistory.filter(h => h.role === 'user').length;
        let coreRules = "", finalInstruction = "";

        if (userMsgCount >= 7) {
          coreRules = `[핵심 대화 원칙 - 마무리 단계]
1. 절대 질문 금지: 어떠한 형태의 질문(?로 끝나는 문장)도 절대 금지야.
2. 요약과 격려: 학생이 지금까지 대답한 내용들을 종합해서 핵심을 1~2문장으로 멋지게 요약해줘.
3. 단호한 종료: "충분히 고민했네. 이제 다음 단계로 넘어가자!" 와 같이 명확하게 마무리해.`;
          finalInstruction = `[최우선 지시] 상담이 종료되었어. 전체 대화를 요약하고 깔끔하게 마무리해줘. 꼬리를 무는 질문은 절대 안 돼.`;
        } else {
          coreRules = `[핵심 대화 원칙]
1. 관점 확장: 학생이 말한 내용에서 출발하여 시야를 조금씩 넓혀주는 질문을 던져.
2. 쉬운 질문: 추상적인 질문은 절대 금지야. 구체적인 경험이나 상황을 떠올릴 수 있도록 쉽게 물어봐.
3. 난이도 조절: 학생이 "모르겠어", "어려워" 하면 즉시 난이도를 낮춰서 쉬운 예시나 선택지를 줘.
4. 변화 포착: 초기 생각과 학습 후 생각의 차이를 긍정적으로 연결해줘.
5. 단일 질문: 내용을 종합하여 단 하나의 질문만 던져.`;
          if (type === 'mid' && userMsgCount === 0) {
            finalInstruction = `[첫 대화 시작] 초기 생각과 퀴즈 답변을 비교해서 변화된 지점을 짚어주며 자연스럽게 하나의 질문을 던져.`;
          } else if (type === 'final' && userMsgCount === 0) {
            finalInstruction = `[마무리 대화 시작] '마음 점검' 내용을 바탕으로, 앞으로의 구체적인 실천을 돕는 하나의 질문을 던져줘.`;
          }
        }

        const systemPrompt = `너는 통찰력 있는 멘토야. 따뜻하고 친근한 반말을 사용해(카톡하듯 1~2문장).
본인을 '나'라고 칭하고, '수석', '김수석', '선생님' 같은 호칭은 절대 스스로 쓰지 마.

[데이터]
1. Step 0 (학습 전 초기 생각): "${answers.initialThought}"
2. Step 2 (학습 후 퀴즈 답변): ${JSON.stringify(answers.quiz)}
${type === 'final' ? `3. Step 4 (마음 점검): ${JSON.stringify(answers.check)}` : ''}

${coreRules}
현재 상황: [${selectedKeyword}]에 대한 ${type === 'mid' ? '중간 점검 대화' : '마무리 실천 대화'}.
${finalInstruction}`;

        const requestMessages = apiMessages.length > 0 ? apiMessages : [{ role: 'user', parts: [{ text: '대화를 시작해줘.' }] }];
        const response = await callGemini(systemPrompt, requestMessages);
        setHistory([...updatedHistory, { role: 'assistant', content: response }]);
        setIsTyping(false);
      };

      const handleKeyPress = (e, type) => {
        if (e.key === 'Enter') { e.preventDefault(); sendChatMessage(type); }
      };

      const handleDownloadImage = async () => {
        if (window.html2canvas) {
          setIsDownloading(true);
          try {
            const element = document.getElementById('report-content');
            const canvas = await window.html2canvas(element, { useCORS: true, scale: 2, backgroundColor: '#ffffff' });
            const link = document.createElement('a');
            link.download = `김수석_컨설팅_${selectedKeyword}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
          } catch (err) { window.print(); }
          setIsDownloading(false);
        } else { window.print(); }
      };

      const getKeywordDescription = (key) => {
        const map = { '겸손': '결과에 취하지 않고 균형을 잡는 힘', '연표': '사건의 인과 관계와 흐름을 보는 정리 방식', '예습': '배울 내용을 미리 만나 낯설지 않게 만드는 준비', '과정': '결과가 만들어지는 흐름에 주목하는 관점', '훈련': '기준을 가지고 의도적으로 반복하는 연습', '실험': '왜 그런지 이유를 설명할 수 있는 사고', '문제집': '이미 배운 것을 점검하고 강화하는 도구' };
        return map[key] || '';
      };

      const VIEWS = ['p0', 'p1', 'p2', 'p3', 'p4', 'p5', 'p6'];

      // ---- Render Home ----
      const renderHome = () => (
        <div className="anim-fade flex flex-col items-center justify-center min-h-screen py-10 px-6 space-y-10">
          <div className="text-center">
            <div className="flex justify-center mb-6">
              <div style={{ width: 96, height: 96, borderRadius: 30, overflow: 'hidden', border: '4px solid white', boxShadow: '0 8px 24px rgba(0,0,0,0.12)', background: '#eff6ff' }}>
                <img src={KIM_SUSEOK_PROFILE} alt="김수석" style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
              </div>
            </div>
            <h1 style={{ fontSize: '2rem', fontWeight: 900, color: '#1e293b', marginBottom: 8, letterSpacing: '-0.05em' }}>7일 공부 체질 만들기</h1>
            <p style={{ color: '#64748b', fontWeight: 700 }}>나를 수석으로 만드는 마음의 힘을 길러보자.</p>
          </div>
          <div style={{ width: '100%', maxWidth: 960, display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(280px,1fr))', gap: 20 }}>
            {Object.keys(KEYWORDS_DATA).map((key, index) => (
              <button key={key} onClick={() => startSession(key)} style={{ background: 'white', padding: 24, borderRadius: 28, border: '2px solid #f1f5f9', boxShadow: '0 2px 8px rgba(0,0,0,0.06)', textAlign: 'left', display: 'flex', flexDirection: 'column', justifyContent: 'space-between', minHeight: 160, cursor: 'pointer', transition: 'all 0.2s' }}
                onMouseEnter={e => { e.currentTarget.style.borderColor = '#3b82f6'; e.currentTarget.style.transform = 'translateY(-4px)'; e.currentTarget.style.boxShadow = '0 12px 32px rgba(59,130,246,0.2)' }}
                onMouseLeave={e => { e.currentTarget.style.borderColor = '#f1f5f9'; e.currentTarget.style.transform = 'translateY(0)'; e.currentTarget.style.boxShadow = '0 2px 8px rgba(0,0,0,0.06)' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                  <div>
                    <div style={{ fontSize: '1.5rem', fontWeight: 900, color: '#1e293b', marginBottom: 4 }}>{key}</div>
                    <span style={{ background: '#eff6ff', color: '#3b82f6', fontSize: 10, fontWeight: 700, padding: '2px 8px', borderRadius: 6 }}>{index + 1}일차</span>
                  </div>
                  <div style={{ width: 40, height: 40, background: '#eff6ff', borderRadius: 16, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <ChevronRight size={20} color="#3b82f6" />
                  </div>
                </div>
                <p style={{ color: '#94a3b8', fontSize: 12, fontWeight: 700, marginTop: 8 }}>{getKeywordDescription(key)}</p>
              </button>
            ))}
          </div>
        </div>
      );

      // ---- Render P0 ----
      const renderP0 = () => (
        <div className="anim-slide" style={{ maxWidth: 640, margin: '0 auto', padding: 16, paddingTop: 40 }}>
          <div style={{ textAlign: 'center', marginBottom: 32 }}>
            <span style={{ background: '#dbeafe', color: '#3b82f6', padding: '6px 16px', borderRadius: 999, fontWeight: 900, fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.1em' }}>First Thought</span>
            <h2 style={{ fontSize: '1.5rem', fontWeight: 700, color: '#1e293b', marginTop: 16, marginBottom: 8 }}>'{selectedKeyword}', 너는 어떻게 생각해?</h2>
            <p style={{ color: '#64748b' }}>정답은 없어. 평소에 이 단어를 들으면 어떤 느낌이나 생각이 드는지 자유롭게 적어줘.</p>
          </div>
          <textarea style={{ width: '100%', padding: 24, background: 'white', border: '2px solid #f1f5f9', borderRadius: 32, outline: 'none', minHeight: 200, fontSize: '1.1rem', fontWeight: 500, color: '#334155', lineHeight: 1.7, resize: 'vertical', transition: 'border-color 0.2s', fontFamily: 'inherit' }}
            placeholder={`예: 나는 ${selectedKeyword}이(가) 정말...`}
            value={answers.initialThought}
            onFocus={e => e.target.style.borderColor = '#60a5fa'}
            onBlur={e => e.target.style.borderColor = '#f1f5f9'}
            onChange={(e) => setAnswers(prev => ({ ...prev, initialThought: e.target.value }))} />
          <button disabled={!answers.initialThought.trim()} onClick={handleNext}
            style={{ width: '100%', marginTop: 16, padding: '20px 0', background: answers.initialThought.trim() ? '#0f172a' : '#e2e8f0', color: answers.initialThought.trim() ? 'white' : '#94a3b8', borderRadius: 24, fontWeight: 700, fontSize: '1.2rem', border: 'none', cursor: answers.initialThought.trim() ? 'pointer' : 'not-allowed', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, transition: 'all 0.2s' }}>
            내 생각 적었어, 다음! <ChevronRight size={20} />
          </button>
        </div>
      );

      // ---- Render P1 ----
      const renderP1 = () => {
        const data = KEYWORDS_DATA[selectedKeyword];
        const isDefComplete = defIndex >= data.definition.length;
        const isImpComplete = impIndex >= data.importance.length - 1;

        return (
          <div className="anim-slide" style={{ maxWidth: 640, margin: '0 auto', padding: 16, paddingBottom: 80 }}>
            <div style={{ background: 'white', padding: 32, borderRadius: 40, boxShadow: '0 2px 8px rgba(0,0,0,0.06)', border: '1px solid #f8fafc', marginBottom: 20 }}>
              <h2 style={{ fontSize: '1.1rem', fontWeight: 700, color: '#3b82f6', marginBottom: 24, display: 'flex', alignItems: 'center', gap: 8 }}>
                <HelpCircle size={20} /> {selectedKeyword}{getJosa(selectedKeyword)} 원래 무엇일까?
              </h2>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
                {data.definition.map((line, i) => (
                  i <= defIndex && (

                <div style={{ display: 'flex', gap: 6 }}>
                  {VIEWS.map((v, num) => (
                    <div key={num} style={{ width: 6, height: 6, borderRadius: 999, transition: 'all 0.4s', background: VIEWS.indexOf(view) >= num ? '#60a5fa' : '#334155', transform: VIEWS.indexOf(view) >= num ? 'scale(1.3)' : 'scale(1)' }} />
                  ))}
                </div>
                <div style={{ width: 1, height: 12, background: '#334155' }}></div>
                <span style={{ fontSize: 10, fontWeight: 900, color: '#94a3b8', textTransform: 'uppercase', letterSpacing: '0.15em' }}>
                  Step {VIEWS.indexOf(view) + 1}
                </span>
              </div>
            )}
          </header>

          <main style={{ maxWidth: 960, margin: '0 auto' }}>
            {view === 'home' && renderHome()}
            {view === 'p0' && renderP0()}
            {view === 'p1' && renderP1()}
            {view === 'p2' && renderP2()}
            {view === 'p3' && renderChat('mid')}
            {view === 'p4' && renderP4()}
            {view === 'p5' && renderChat('final')}
            {view === 'p6' && renderP6()}
            {view === 'report' && renderReport()}
          </main>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
